<div class="container">
  <div class="nombre-section">

    <label >Nombre del Avatar</label>

    <input type ="text" [value]="nombre()" (input)="Nombre($event)" placeholder="Nombre del avatar" class="nombre-input"/>

  <div class="canvas-avatar">
    <div
      class="cuerpo"
      [style.background-color]="colorFondo()"
      [style.width.px]="tamano()"
      [style.height.px]="tamano()"
      [style.transform]="'rotate(' + anguloGiro() + 'deg)'"
    >
      <div class="ojos">
        <div class="ojo"></div>
        <div class="ojo"></div>
        @if (tieneLentes()) {
          <div class="lentes"></div>
        }
      </div>
      <div class="boca">
        @switch (tipoExpresion()) {
          @case (1) {
            <div class="feliz"></div>
          }
          @case (2) {
            <div class="sorprendido"></div>
          }
          @case (3) {
            <div class="serio"></div>
          }
        }
      </div>
    </div>

 
  </div>
  <div>
    
    <h2 [style.color]= "colorFondo()">  {{nombre()}}</h2>
  </div>

  
  <div class="controles">
    <label color>
      <input type="color" [value]="colorFondo()" (input)="cambiarColor($event)" />
    </label>

    <label Tamaño>
      <input type="range" min="100" max="300" [value]="tamano()" (input)="cambiarTamano($event)" />
    </label>
    <button (click)="toggleLentes()">
      {{ tieneLentes() ? 'Quitar lentes' : 'Poner lentes' }} 
    </button>
    <div class="expresiones">
      <p>Expresión</p>
      <button (click)="setExpresion(1)">feliz</button>
      <button (click)="setExpresion(2)">sorprendido</button>
      <button (click)="setExpresion(3)">serio</button>
    </div>
    <div class="giro-controles">
      <p>Girar Avatar</p>
      <button (click)="toggleGiro()" class="boton-girar">
        {{ estaGirando() ? 'Detener' : 'Girar' }}
      </button>
    </div>
  </div>
</div>
